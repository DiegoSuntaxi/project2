<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar lugares en mapa</title>
    <link rel="stylesheet" href="/static/styles.css?v=2" />
</head>

<body>
    <div class="page">
        <div class="hero">
            <h1>📍 Buscar lugares desde el mapa</h1>
            <p>Haz clic en el mapa para elegir la ubicación.</p>
        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

        <div class="form-box">
            <div class="selected-data">
                <p><strong>Latitud seleccionada:</strong> <span id="selected-lat">No seleccionada</span></p>
                <p><strong>Longitud seleccionada:</strong> <span id="selected-lng">No seleccionada</span></p>
            </div>

            <div class="controls-row">
                <div class="control-group">
                    <label for="radius">Radio (metros):</label>
                    <input type="number" id="radius" value="1000" />
                </div>

                <div class="control-group">
                    <label for="type">Tipo:</label>
                    <select id="type">
                        <option value="restaurant">Restaurant</option>
                        <option value="cafe">Cafe</option>
                        <option value="pharmacy">Pharmacy</option>
                        <option value="hospital">Hospital</option>
                        <option value="bank">Bank</option>
                        <option value="school">School</option>
                        <option value="store">Store</option>
                    </select>
                </div>

                <div class="control-group button-group">
                    <button onclick="loadPlaces()">Buscar</button>
                </div>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let map;
        let selectedLat = null;
        let selectedLng = null;
        let selectedMarker = null;

        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            const initialCenter = { lat: -0.180653, lng: -78.467834 };

            map = new Map(document.getElementById("map"), {
                center: initialCenter,
                zoom: 14,
                mapId: "DEMO_MAP_ID"
            });

            map.addListener("click", (event) => {
                selectedLat = event.latLng.lat();
                selectedLng = event.latLng.lng();

                document.getElementById("selected-lat").textContent = selectedLat.toFixed(6);
                document.getElementById("selected-lng").textContent = selectedLng.toFixed(6);

                if (selectedMarker) {
                    selectedMarker.map = null;
                }

                selectedMarker = new AdvancedMarkerElement({
                    map: map,
                    position: { lat: selectedLat, lng: selectedLng },
                    title: "Ubicación seleccionada"
                });
            });
        }

        async function loadPlaces() {
            const radius = document.getElementById("radius").value;
            const type = document.getElementById("type").value;
            const container = document.getElementById("results");

            if (selectedLat === null || selectedLng === null) {
                alert("Primero selecciona un punto en el mapa.");
                return;
            }

            container.innerHTML = `<div class="message loading">Cargando resultados...</div>`;

            try {
                const response = await fetch(
                    `/api/restaurants?lat=${selectedLat}&lng=${selectedLng}&radius=${radius}&type=${type}`
                );

                if (!response.ok) {
                    throw new Error("Error en la API");
                }

                const data = await response.json();
                container.innerHTML = "";

                if (!data.length) {
                    container.innerHTML = `<div class="message empty">No se encontraron resultados.</div>`;
                    return;
                }

                data.forEach(r => {
                    const imageUrl = r.photo_url || "/static/imagen.jpg";

                    container.innerHTML += `
                        <div class="card">
                            <img src="${imageUrl}" alt="Place image" class="card-image" loading="lazy">
                            <div class="card-body">
                                <h3>${r.name || "Sin nombre"}</h3>
                                <p><strong>Dirección:</strong> ${r.address || "No disponible"}</p>
                                <p><strong>Calificación:</strong> ⭐ ${r.rating ?? "N/A"}</p>
                                <p><strong>Usuarios:</strong> 👥 ${r.users ?? 0}</p>
                                <p>
                                    <a href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank">
                                        Ver ubicación
                                    </a>
                                </p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="message error">No se pudieron cargar los resultados.</div>`;
            }
        }
    </script>

    <script>
        (g => {
            var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window;
            b = b[c] || (b[c] = {});
            var d = b.maps || (b.maps = {}), r = new Set(), e = new URLSearchParams(),
                u = () => h || (h = new Promise(async (f, n) => {
                    await (a = m.createElement("script"));
                    e.set("libraries", [...r] + "");
                    for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                    e.set("callback", c + ".maps." + q);
                    a.src = `https://maps.googleapis.com/maps/api/js?` + e;
                    d[q] = f;
                    a.onerror = () => h = n(Error(p + " no se pudo cargar."));
                    a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                    m.head.append(a);
                }));
            d[l] ? console.warn(p + " solo carga una vez.") : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n));
        })({
            key: "{{ maps_api_key }}",
            v: "weekly"
        });

        initMap();
    </script>
</body>

</html>
